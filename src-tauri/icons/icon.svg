<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Toolbox icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="t" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="cursor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="480" height="240" rx="100" fill="#ffffff" opacity="0.06"/>

  <!-- Letter T (toolbox + terminal) -->
  <g filter="url(#shadow)">
    <path d="M 96 136 H 416 V 196 H 280 V 392 H 232 V 196 H 96 Z" fill="url(#t)"/>
  </g>

  <!-- Command-line cursor accent (the "_" of a terminal) -->
  <rect x="304" y="320" width="28" height="72" rx="6" fill="url(#cursor)"/>

  <!-- Tiny launcher dot (top-right) suggesting "quick launch" -->
  <circle cx="416" cy="96" r="18" fill="#22d3ee"/>
  <circle cx="416" cy="96" r="18" fill="none" stroke="#0b1220" stroke-width="4" opacity="0.25"/>
</svg>